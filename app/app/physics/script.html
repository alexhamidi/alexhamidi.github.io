<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Circular Orbit</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            min-height: 100vh;
            background: #0a0a0a;
        }
        canvas {
            border: 1px solid #333;
        }
    </style>
</head>
<body>
    <canvas id="canvas1" width="600" height="600"></canvas>
    <canvas id="canvas2" width="600" height="600"></canvas>
    
    <script>
        function createSimulation1(canvasId) {
            const canvas = document.getElementById(canvasId);
            const ctx = canvas.getContext('2d');
            
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            const orbitRadius = 120;
            const orbitingCircleRadius = 15;
            const stationaryCircleRadius = 20;
            
            const stationaryX = centerX;
            const stationaryY = centerY - (orbitRadius + 100);
            
            let angle = 0;
            let prevdi = 0; 
            let prevvel = 0; 

            let verticalTime = 0;
            const velocity = 100;
            const waitTime = 1000;
            const travelDistance = canvas.height/2+orbitRadius - centerY;
            const travelTime = travelDistance / velocity * 1000;

            const round = (number, places) => Math.round(number * 10 ** places) / (10 ** places);
            
            let lastTime = Date.now();
            
            function draw() {
                const now = Date.now();
                const deltaTime = now - lastTime;
                lastTime = now;
                
                verticalTime += deltaTime;
                
                ctx.fillStyle = '#0a0a0a';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                ctx.strokeStyle = '#333';
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.arc(centerX, centerY, orbitRadius, 0, Math.PI * 2);
                ctx.stroke();
                
                const orbitingX = centerX + Math.cos(angle) * orbitRadius;
                const orbitingY = centerY + Math.sin(angle) * orbitRadius;
                
                ctx.fillStyle = '#4a9eff';
                ctx.beginPath();
                ctx.arc(orbitingX, orbitingY, orbitingCircleRadius, 0, Math.PI * 2);
                ctx.fill();

                const fX = centerX + Math.cos(angle) * orbitRadius*.9;
                const fY = centerY + Math.sin(angle) * orbitRadius*.9;
                
                ctx.fillStyle = '#FFFF00';
                ctx.beginPath();
                ctx.arc(fX, fY, 2, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.fillStyle = '#ff6b6b';
                ctx.beginPath();
                ctx.arc(stationaryX, stationaryY, stationaryCircleRadius, 0, Math.PI * 2);
                ctx.fill();

                ctx.strokeStyle = '#333';
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.moveTo(stationaryX, stationaryY);
                ctx.lineTo(orbitingX, orbitingY);
                ctx.stroke();

                const distance = round(Math.sqrt((orbitingX - stationaryX) ** 2 + (orbitingY - stationaryY) ** 2), 4); 
                const velocity = round(distance - prevdi, 4)
                const acceleration = round((round(velocity - prevvel, 4)*1000),2)

                const midX = (stationaryX + orbitingX) / 2;
                const midY = (stationaryY + orbitingY) / 2;
                ctx.save();
                ctx.fillStyle = '#fff';
                ctx.font = '20px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(acceleration, midX, midY);
                ctx.restore();
                
                const cycleTime = travelTime + waitTime + travelTime + waitTime;
                const timeInCycle = verticalTime % cycleTime;
                let whiteY;
                
                if (timeInCycle < travelTime) {
                    const progress = timeInCycle / travelTime;
                    whiteY = centerY + progress * travelDistance;
                } else if (timeInCycle < travelTime + waitTime) {
                    whiteY = canvas.height/2+orbitRadius;
                } else if (timeInCycle < travelTime + waitTime + travelTime) {
                    const progress = (timeInCycle - travelTime - waitTime) / travelTime;
                    whiteY = canvas.height/2+orbitRadius - progress * travelDistance;
                } else {
                    whiteY = centerY;
                }
                
                ctx.fillStyle = '#ffffff';
                ctx.beginPath();
                ctx.arc(centerX, whiteY, 10, 0, Math.PI * 2);
                ctx.fill();
                
                prevdi = distance;
                prevvel = velocity; 
                angle += 0.01;
                
                requestAnimationFrame(draw);
            }
            
            draw();
        }
        function createSimulation2(canvasId) {
            const canvas = document.getElementById(canvasId);
            const ctx = canvas.getContext('2d');
            
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            const orbitRadius = 120;
            const orbitingCircleRadius = 15;
            const stationaryCircleRadius = 20;
            
            const stationaryX = centerX;
            const stationaryY = centerY - (orbitRadius + 100);
            
            let angle = 0;
            let prevdi = 0; 
            let prevvel = 0; 

            let verticalTime = 0;
            const velocity = 100;
            const waitTime = 1000;
            const travelDistance = canvas.height/2+orbitRadius - centerY;
            const travelTime = travelDistance / velocity * 1000;

            const round = (number, places) => Math.round(number * 10 ** places) / (10 ** places);
            
            let lastTime = Date.now();
            
            function draw() {
                const now = Date.now();
                const deltaTime = now - lastTime;
                lastTime = now;
                
                verticalTime += deltaTime;
                
                ctx.fillStyle = '#0a0a0a';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                ctx.strokeStyle = '#333';
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.arc(centerX, centerY, orbitRadius, 0, Math.PI * 2);
                ctx.stroke();
                
                const orbitingX = centerX;
                const orbitingY = centerY + orbitRadius;
                
                ctx.fillStyle = '#4a9eff';
                ctx.beginPath();
                ctx.arc(orbitingX, orbitingY, orbitingCircleRadius, 0, Math.PI * 2);
                ctx.fill();

                const fX = centerX;
                const fY = centerY + orbitRadius*.9;
                
                ctx.fillStyle = '#FFFF00';
                ctx.beginPath();
                ctx.arc(fX, fY, 2, 0, Math.PI * 2);
                ctx.fill();
                
                // Make the red one (stationary circle) orbit at constant distance (orbitRadius + 100)
                const redOrbitRadius = orbitRadius + 100;
                const redAngle = angle;
                const redX = centerX + redOrbitRadius * -Math.cos(redAngle);
                const redY = centerY + redOrbitRadius * -Math.sin(redAngle);

                ctx.fillStyle = '#ff6b6b';
                ctx.beginPath();
                ctx.arc(redX, redY, stationaryCircleRadius, 0, Math.PI * 2);
                ctx.fill();

                const distance = round(Math.sqrt((orbitingX - redX) ** 2 + (orbitingY - redY) ** 2), 4); 
                const velocity = round(distance - prevdi, 4)
                const acceleration = round((round(velocity - prevvel, 4)*1000),2)
                ctx.strokeStyle = '#333';
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.moveTo(redX, redY);
                ctx.lineTo(orbitingX, orbitingY);
                ctx.stroke();

                const midX = (redX + orbitingX) / 2;
                const midY = (redY + orbitingY) / 2;
                ctx.save();
                ctx.fillStyle = '#fff';
                ctx.font = '20px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(acceleration, midX, midY);
                ctx.restore();
                
                const cycleTime = travelTime + waitTime + travelTime + waitTime;
                const timeInCycle = verticalTime % cycleTime;
                let wp;
                
                if (timeInCycle < travelTime) {
                    wp = timeInCycle / travelTime;
                } else if (timeInCycle < travelTime + waitTime) {
                    wp = 1
                } else if (timeInCycle < travelTime + waitTime + travelTime) {
                    wp = 1-(timeInCycle - travelTime - waitTime) / travelTime;
                } else {
                    wp = 0;
                }
                
                // first assume always in lowest position 
                const whiteX = centerX + Math.cos(redAngle) * orbitRadius * wp;
                const whiteYRotated = centerX + Math.sin(redAngle) * orbitRadius * wp;
                
                ctx.fillStyle = '#ffffff';
                ctx.beginPath();
                ctx.arc(whiteX, whiteYRotated, 10, 0, Math.PI * 2);
                ctx.fill();
                
                prevdi = distance;
                prevvel = velocity; 
                angle += 0.01;
                
                requestAnimationFrame(draw);
            }
            draw();
        }
        createSimulation1('canvas1');
        createSimulation2('canvas2');
    </script>
</body>
</html>
